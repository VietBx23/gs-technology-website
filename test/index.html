<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bố cục SVG - Tinh chỉnh Line mảnh</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff;
            margin: 0;
        }
        .canvas {
            width: 500px;
            height: 500px;
            border: 1px solid #f5f5f5;
        }
    </style>
</head>
<body>

<div class="canvas">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        
        <g>
            <path d="M 0 0 L 50 0 A 50 50 0 0 1 0 50 Z" fill="#E34200" stroke="none" />
            
            <g fill="none" stroke="#e0e0e0" stroke-width="0.4">
                <path d="M 54 0 A 54 54 0 0 1 0 54" />
                <path d="M 58 0 A 58 58 0 0 1 0 58" />
                <path d="M 62 0 A 62 62 0 0 1 0 62" />
            </g>
        </g>

        <rect x="0" y="170" width="80" height="30" fill="#0131FF" />

        <g transform="translate(160, 160) scale(0.6)" fill="#E34200">
            <rect x="-12" y="-45" width="24" height="90" rx="2" />
            <rect x="-12" y="-45" width="24" height="90" rx="2" transform="rotate(60)" />
            <rect x="-12" y="-45" width="24" height="90" rx="2" transform="rotate(120)" />
        </g>
        
    </svg>
</div>

</body>
</html>
